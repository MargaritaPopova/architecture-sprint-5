version: "3.1"

intents:
  - greet
  - goodbye
  - inform
  - ask_architecture
  - affirm
  - deny
  - request_info

responses:
  utter_greet:
    - text: "Привет! Чем могу помочь в области архитектуры программного обеспечения?"
    - text: "Здравствуйте! У вас есть вопросы по архитектуре ПО?"
    - text: "Добрый день! Готов помочь с любыми вопросами по проектированию программных систем."

  utter_goodbye:
    - text: "До свидания! Если появятся вопросы по архитектуре ПО, обращайтесь."
    - text: "Всего доброго! Успехов в разработке ПО."
    - text: "Было приятно пообщаться! Обращайтесь, если понадобится помощь."

  utter_ask_more:
    - text: "Что именно вас интересует в архитектуре программного обеспечения?"
    - text: "Можете уточнить, в каком контексте вас интересует архитектура ПО?"
    - text: "Расскажите подробнее о вашем проекте, чтобы я мог дать более точный ответ."

  utter_acknowledge:
    - text: "Понял, расскажите подробнее о вашем проекте или задачах."
    - text: "Я вас понял. Уточните детали, чтобы я мог помочь более конкретно."
    - text: "Хорошо, давайте разберёмся с вашим запросом."

  utter_architecture_response:
    - text: "Архитектура ПО — это фундаментальная структура системы, которая определяет её масштабируемость, гибкость и поддерживаемость. Хотите узнать о конкретных подходах?"
    - text: "В архитектуре ПО важны такие аспекты, как уровень абстракции, модульность, отказоустойчивость и безопасность. Какой аспект вас интересует?"
    - text: "Существует несколько ключевых типов архитектуры: монолитная, микросервисная, событийно-ориентированная и серверлесс. Вам нужна помощь в выборе?"
    - text: "В проектировании ПО используются такие паттерны, как MVC, CQRS, DDD, Layered Architecture. Хотите узнать, какой лучше подойдет для вашей задачи?"
    - text: "Микросервисная архитектура позволяет разрабатывать масштабируемые системы, но требует сложного оркестрирования. Рассказать подробнее?"
    - text: "Монолитная архитектура проще в разработке и отладке, но сложнее в масштабировании. Интересует сравнение с микросервисами?"
    - text: "Если ваш проект требует высокой отказоустойчивости, можно рассмотреть распределенные системы и архитектуру с использованием event-driven подходов. Хотите узнать больше?"
    - text: "Архитектурные решения зависят от множества факторов: нагрузка, доступность, требования к безопасности. Расскажите о вашем проекте, и я помогу подобрать подходящий вариант."

entities:
  - topic

slots:
  topic:
    type: text
    influence_conversation: false
    mappings:
      - type: from_text

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
