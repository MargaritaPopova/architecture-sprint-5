version: "3.1"

nlu:
  - intent: greet
    examples: |
      - Привет
      - Здравствуйте
      - Добрый день
      - привет
      - прив
      - даров
      - привет!
      - Привет
      - привет
      - приветствую
      - Добрый вечер
      - доброе утро

  - intent: goodbye
    examples: |
      - До свидания
      - Пока
      - Увидимся
      - спасибо

  - intent: ask_architecture
    examples: |
      - Расскажите об архитектуре ПО
      - Какие подходы существуют в архитектуре?
      - Что такое микросервисная архитектура?
      - Как выбрать архитектуру ПО?
      - чем отличаются микросервисный и монолитный подходы?
      - что такое архитектура ПО?
      - расскажи, что такое микросервис

  - intent: affirm
    examples: |
      - Да
      - Верно
      - Именно
      - согласен
      - согласна
      - пойдет

  - intent: deny
    examples: |
      - Нет
      - Не нужно
      - Неверно
      - не согласна
      - не согласен
      - неправильно

  - intent: request_info
    examples: |
      - Расскажите больше об этом
      - Можете уточнить?
      - Какие есть детали?
